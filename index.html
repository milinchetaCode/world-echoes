<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Echoes - Generative Art Installation</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        #art-canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            filter: contrast(1.1) saturate(1.2);
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #start-screen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: #000;
            transition: opacity 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #data-hud {
            position: absolute;
            bottom: 6rem;
            left: 2rem;
            max-width: 380px;
            opacity: 0;
            transition: opacity 2s ease, transform 1s ease;
            transform: translateY(30px);
        }

        #data-hud.visible {
            opacity: 1;
            transform: translateY(0);
        }

        #control-panel {
            position: absolute;
            bottom: 6rem;
            right: 2rem;
            width: 240px;
            opacity: 0;
            transition: opacity 2s ease;
        }
        
        #control-panel.visible {
            opacity: 1;
        }

        .ticker-wrap {
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 50;
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            pointer-events: auto;
            height: 3.5rem;
            display: flex;
            align-items: center;
            overflow: hidden;
        }

        .ticker-wrap.visible { opacity: 1; }

        .ticker {
            display: inline-block;
            white-space: nowrap;
            padding-right: 100vw;
            will-change: transform;
            animation: ticker-anim var(--ticker-duration, 180s) linear infinite;
        }

        @keyframes ticker-anim {
            0% { transform: translate3d(100vw, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }

        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 2px;
            background: rgba(255,255,255,0.1);
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #fff;
            margin-top: -5px;
            cursor: pointer;
        }

        #freq-label {
            background: #000000 !important;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 1.5rem;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 2;
        }
    </style>
</head>
<body>

    <canvas id="art-canvas"></canvas>

    <div id="start-screen">
        <div class="glass-panel p-20 rounded-[3rem] text-center max-w-2xl mx-4">
            <div class="mb-10 inline-block relative">
                <i class="ph ph-スピーカー-high text-7xl text-white/90"></i>
                <div class="absolute inset-0 bg-blue-500/20 blur-3xl rounded-full"></div>
            </div>
            <h1 class="text-6xl font-thin tracking-[0.5em] mb-8">ECHOES</h1>
            <button id="start-btn" class="group px-16 py-6 bg-white text-black rounded-full font-bold tracking-[0.3em] hover:bg-indigo-50 hover:scale-105 transition-all flex items-center gap-6 mx-auto">
                <span class="text-sm">ENTER STREAM</span>
                <i class="ph ph-arrow-right text-xl group-hover:translate-x-2 transition-transform"></i>
            </button>
        </div>
    </div>

    <div id="ui-layer">
        <div id="data-hud" class="glass-panel p-8 rounded-3xl">
            <div class="space-y-6">
                <div>
                    <span class="text-[8px] font-mono uppercase text-gray-500 tracking-[0.3em] block mb-1">Atmospheric Input</span>
                    <p id="weather-text" class="text-xl font-extralight text-white tracking-tight">--</p>
                </div>
                <div>
                    <span class="text-[8px] font-mono uppercase text-gray-500 tracking-[0.3em] block mb-1">Neural Resonance</span>
                    <div id="hud-mood" class="text-[11px] font-light text-gray-400 italic tracking-wide">
                        Calibrating telemetry...
                    </div>
                </div>
            </div>
        </div>

        <div id="control-panel" class="glass-panel p-6 rounded-3xl pointer-events-auto">
            <div class="space-y-6">
                <div class="flex items-center justify-between mb-2">
                    <span class="text-[8px] font-mono uppercase text-white tracking-[0.3em]">Console</span>
                    <i class="ph ph-sliders text-xs text-gray-500"></i>
                </div>
                
                <div>
                    <label class="text-[8px] text-gray-500 uppercase tracking-widest block mb-2">Telemetry Velocity</label>
                    <input type="range" id="speed-control" min="30" max="600" value="180" step="10">
                </div>

                <div>
                    <label class="text-[8px] text-gray-500 uppercase tracking-widest block mb-2">Visual Complexity</label>
                    <input type="range" id="density-control" min="50" max="300" value="130">
                </div>

                <div>
                    <label class="text-[8px] text-gray-500 uppercase tracking-widest block mb-2">Style Mutation Rate</label>
                    <input type="range" id="evolution-control" min="0" max="100" value="12">
                </div>
            </div>
        </div>
    </div>

    <div id="news-ticker" class="ticker-wrap">
        <div id="freq-label">
            <span class="text-[9px] font-mono text-white tracking-[0.4em] uppercase flex items-center gap-3">
                <span class="w-1 h-1 bg-red-500 rounded-full animate-pulse"></span>
                live
            </span>
        </div>
        <div class="ticker text-sm font-light tracking-[0.2em] text-gray-400" id="ticker-content">
            Initialising global data sync...
        </div>
    </div>

    <script>
        const State = {
            isRunning: false,
            weather: { temp: 20, wind: 5 },
            news: [],
            sentiment: 0,
            targetHue: 220,
            currentHue: 220,
            speedMult: 1.0,
            visMode: 'neural', 
            evolution: 0,
            visVariants: {
                neural: ['synaptic', 'subatomic'],
                flow: ['liquid', 'turbulent'],
                geometric: ['monolith', 'prism']
            },
            currentVariant: 'synaptic',
            scales: {
                calm: ["C4", "E4", "G4", "B4", "D5"],
                neutral: ["C3", "F3", "G3", "Bb3", "C4"],
                tense: ["C3", "Db3", "E3", "Gb3", "Ab3"]
            },
            currentScale: ["C3", "F3", "G3", "Bb3", "C4"],
            variationSeed: 0,
            // User Controls
            tickerDuration: 180,
            particleCount: 130,
            mutationSpeed: 0.12
        };

        const canvas = document.getElementById('art-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const dataHud = document.getElementById('data-hud');
        const controlPanel = document.getElementById('control-panel');
        const newsTicker = document.getElementById('news-ticker');
        const tickerContent = document.getElementById('ticker-content');
        const tickerContainer = document.querySelector('.ticker');

        let width, height;
        let particles = [];

        // --- CONTROLS ---
        document.getElementById('speed-control').addEventListener('input', (e) => {
            const val = e.target.value;
            document.documentElement.style.setProperty('--ticker-duration', `${val}s`);
            State.tickerDuration = val;
        });

        document.getElementById('density-control').addEventListener('input', (e) => {
            State.particleCount = parseInt(e.target.value);
            adjustParticleCount();
        });

        document.getElementById('evolution-control').addEventListener('input', (e) => {
            State.mutationSpeed = parseFloat(e.target.value) / 100;
        });

        function adjustParticleCount() {
            if (particles.length < State.particleCount) {
                while (particles.length < State.particleCount) particles.push(new Agent());
            } else {
                particles.length = State.particleCount;
            }
        }

        // --- AUDIO ---
        let analyzer, mainSynth, subDrone, filter;
        
        async function initAudio() {
            await Tone.start();
            analyzer = new Tone.Analyser("waveform", 256);
            const reverb = new Tone.Reverb({ decay: 15, wet: 0.5 }).toDestination();
            filter = new Tone.Filter(1000, "lowpass").connect(reverb).connect(analyzer);
            
            mainSynth = new Tone.PolySynth(Tone.FMSynth).connect(filter);
            mainSynth.volume.value = -12;

            subDrone = new Tone.FMSynth().connect(reverb);
            subDrone.volume.value = -30;
            subDrone.triggerAttack("C1");

            new Tone.Loop(time => {
                if(!State.isRunning) return;
                const note = State.currentScale[Math.floor(Math.random() * State.currentScale.length)];
                if (Math.random() > 0.7) mainSynth.triggerAttackRelease(note, "1n", time, 0.2);
            }, "2n").start(0);

            Tone.Transport.start();
        }

        async function gatherWorldData() {
            try {
                const feeds = ['http://feeds.bbci.co.uk/news/world/rss.xml', 'https://rss.nytimes.com/services/xml/rss/nyt/World.xml'];
                const results = await Promise.all(feeds.map(f => fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(f)}`).then(r => r.json())));
                let headlines = [];
                results.forEach(res => { if (res.items) res.items.forEach(item => headlines.push(item.title.toUpperCase())); });
                if (headlines.length > 0) State.news = headlines.sort(() => Math.random() - 0.5);
                
                const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=40.71&longitude=-74.00&current_weather=true`);
                const wData = await wRes.json();
                State.weather = { temp: wData.current_weather.temperature, wind: wData.current_weather.windspeed };
                document.getElementById('weather-text').innerText = `${State.weather.temp}°C / ${State.weather.wind} KMH`;
                
                processState();
                tickerContent.innerHTML = State.news.join(' <span class="mx-24 opacity-20">—</span> ');
            } catch (e) { console.log(e); }
        }

        function processState() {
            const txt = State.news.join(" ").toLowerCase();
            const pos = ['peace', 'discovery', 'new', 'rise', 'deal', 'future'];
            const neg = ['war', 'crisis', 'threat', 'crash', 'fears', 'tension'];
            let score = 0;
            pos.forEach(w => { if(txt.includes(w)) score++; });
            neg.forEach(w => { if(txt.includes(w)) score--; });
            State.sentiment = score / 5;

            const moodEl = document.getElementById('hud-mood');
            if (State.sentiment > 0.5) {
                State.targetHue = 190; State.visMode = 'flow';
                moodEl.innerText = "Coherent harmony. Fluid motion active.";
            } else if (State.sentiment < -0.5) {
                State.targetHue = 350; State.visMode = 'geometric';
                moodEl.innerText = "Systematic dissonance. Structural rigidity.";
            } else {
                State.targetHue = 240; State.visMode = 'neural';
                moodEl.innerText = "Balanced telemetry. Standard neural sync.";
            }
            State.speedMult = 0.4 + (State.weather.wind * 0.05);
        }

        class Agent {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width; this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2; this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 3 + 1.0;
            }
            update() {
                if (State.visMode === 'flow') {
                    const noise = Math.sin(this.x * 0.005) * Math.cos(this.y * 0.005) * Math.PI * 2;
                    this.vx += Math.cos(noise) * 0.1; this.vy += Math.sin(noise) * 0.1;
                    this.vx *= 0.98; this.vy *= 0.98;
                }
                this.x += this.vx * State.speedMult; this.y += this.vy * State.speedMult;
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.reset();
            }
            draw(audioSens) {
                const drawStyle = Math.floor(State.variationSeed % 3);
                const dynamicSize = this.size * (1 + audioSens * 2);
                ctx.fillStyle = ctx.strokeStyle = `hsla(${State.currentHue}, 70%, 70%, ${0.4 + audioSens})`;
                
                if (State.visMode === 'geometric' || drawStyle === 2) {
                    ctx.save(); ctx.translate(this.x, this.y);
                    ctx.rotate(Date.now() * 0.001);
                    ctx.fillRect(-dynamicSize, -dynamicSize, dynamicSize*2, dynamicSize*2);
                    ctx.restore();
                } else if (drawStyle === 1) {
                    ctx.beginPath(); ctx.arc(this.x, this.y, dynamicSize, 0, Math.PI * 2);
                    ctx.lineWidth = 1 + audioSens * 3; ctx.stroke();
                } else {
                    ctx.beginPath(); ctx.arc(this.x, this.y, dynamicSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        function animate() {
            if (!State.isRunning) return;
            State.variationSeed += 0.005;
            State.evolution = (State.evolution + (State.mutationSpeed * 10)) % 100;
            if (State.evolution < 1) {
                const variants = State.visVariants[State.visMode];
                State.currentVariant = variants[Math.floor(Math.random() * variants.length)];
            }

            ctx.fillStyle = `rgba(0, 0, 0, ${State.visMode === 'flow' ? 0.03 : 0.1})`;
            ctx.fillRect(0, 0, width, height);
            State.currentHue += (State.targetHue - State.currentHue) * 0.01;

            const audioData = analyzer.getValue();
            const audioSens = audioData.reduce((a, b) => a + Math.abs(b), 0) / 256;

            if (State.visMode !== 'flow') {
                const threshold = State.currentVariant === 'synaptic' ? 180 : 100;
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw(audioSens);
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
                        const d = dx*dx + dy*dy;
                        if (d < threshold * threshold) {
                            ctx.strokeStyle = `hsla(${State.currentHue}, 60%, 60%, ${(1 - Math.sqrt(d)/threshold) * 0.3})`;
                            ctx.lineWidth = 0.5 + audioSens * 2;
                            ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                        }
                    }
                }
            } else {
                particles.forEach(p => { p.update(); p.draw(audioSens); });
            }
            requestAnimationFrame(animate);
        }

        startBtn.addEventListener('click', async () => {
            startBtn.innerHTML = "SYNCING...";
            await initAudio();
            await gatherWorldData();
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
                dataHud.classList.add('visible');
                controlPanel.classList.add('visible');
                newsTicker.classList.add('visible');
            }, 3000);
            State.isRunning = true;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            particles = Array.from({length: State.particleCount}, () => new Agent());
            animate();
        });

        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
        });
    </script>
</body>
</html>
