<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Echoes - Generative Art Installation</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        #art-canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
            filter: contrast(1.1) saturate(1.2);
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .glass-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: auto;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        #start-screen {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            background: #000;
            transition: opacity 3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #data-hud {
            position: absolute;
            bottom: 6rem;
            left: 2rem;
            max-width: 380px;
            opacity: 0;
            transition: opacity 2s ease, transform 1s ease;
            transform: translateY(30px);
        }

        #data-hud.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .ticker-wrap {
            width: 100%;
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            position: fixed;
            bottom: 0;
            left: 0;
            z-index: 50;
            opacity: 0;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            pointer-events: auto;
            height: 3.5rem;
            display: flex;
            align-items: center;
            overflow: hidden;
        }
        
        .ticker-wrap.focused {
            bottom: 50%;
            transform: translateY(50%);
            height: 20rem;
            background: #000;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 300px rgba(0,0,0,1);
        }

        .ticker-wrap.visible { opacity: 1; }

        .ticker {
            display: inline-block;
            white-space: nowrap;
            padding-right: 100vw;
            will-change: transform;
            /* Balanced news speed - 90 seconds (mid-way between 60 and 900) */
            animation: ticker-anim 90s linear infinite;
        }

        .ticker-wrap.focused .ticker {
            font-size: 3.5rem;
            animation-duration: 250s;
        }

        @keyframes ticker-anim {
            0% { transform: translate3d(100vw, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .pulse-text { animation: pulse 4s ease-in-out infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.95); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        #freq-label {
            background: #000000 !important;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 2;
        }
    </style>
</head>
<body>

    <canvas id="art-canvas"></canvas>

    <div id="start-screen">
        <div class="glass-panel p-20 rounded-[3rem] text-center max-w-2xl mx-4">
            <div class="mb-10 inline-block relative">
                <i class="ph ph-スピーカー-high text-7xl text-white/90"></i>
                <div class="absolute inset-0 bg-blue-500/20 blur-3xl rounded-full"></div>
            </div>
            <h1 class="text-6xl font-thin tracking-[0.5em] mb-8">ECHOES</h1>
            <p class="text-gray-500 text-[10px] mb-14 leading-loose uppercase tracking-[0.6em]">
                Deep Neural World State Synthesis
            </p>
            <button id="start-btn" class="group px-16 py-6 bg-white text-black rounded-full font-bold tracking-[0.3em] hover:bg-indigo-50 hover:scale-105 transition-all flex items-center gap-6 mx-auto">
                <span class="text-sm">ENTER STREAM</span>
                <i class="ph ph-arrow-right text-xl group-hover:translate-x-2 transition-transform"></i>
            </button>
            <p class="text-[9px] text-gray-700 mt-10 tracking-[0.4em] uppercase">Low Frequency Audio Enabled</p>
        </div>
    </div>

    <div id="ui-layer">
        <div id="data-hud" class="glass-panel p-10 rounded-3xl">
            <div class="flex items-center gap-4 mb-8">
                <div id="vis-dot" class="w-3 h-3 rounded-full bg-white shadow-[0_0_15px_rgba(255,255,255,0.5)] pulse-text"></div>
                <div class="h-[1px] flex-grow bg-white/10"></div>
            </div>
            
            <div class="space-y-8">
                <div>
                    <span class="text-[8px] font-mono uppercase text-gray-500 tracking-[0.3em] block mb-2">Atmospheric Input</span>
                    <p id="weather-text" class="text-2xl font-extralight text-white tracking-tight">--</p>
                </div>
                
                <div>
                    <span class="text-[8px] font-mono uppercase text-gray-500 tracking-[0.3em] block mb-2">Neural Resonance</span>
                    <div id="hud-mood" class="text-sm font-light text-gray-300 leading-relaxed italic tracking-wide">
                        Calibrating telemetry...
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="news-ticker" class="ticker-wrap">
        <div id="freq-label">
            <span class="text-[10px] font-mono text-white tracking-[0.4em] uppercase flex items-center gap-3">
                <span class="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>
                live telemetry
            </span>
        </div>
        <div class="ticker text-sm font-light tracking-[0.2em] text-gray-400" id="ticker-content">
            Connecting to global neural network. Standby for sync.
        </div>
    </div>

    <script>
        const State = {
            isRunning: false,
            isFocused: false,
            weather: { temp: 20, wind: 5 },
            news: [],
            sentiment: 0,
            targetHue: 220,
            currentHue: 220,
            speedMult: 1.0,
            visMode: 'neural', 
            evolution: 0,
            visVariants: {
                neural: ['synaptic', 'subatomic'],
                flow: ['liquid', 'turbulent'],
                geometric: ['monolith', 'prism']
            },
            currentVariant: 'synaptic',
            scales: {
                calm: ["C4", "E4", "G4", "B4", "D5"],
                neutral: ["C3", "F3", "G3", "Bb3", "C4"],
                tense: ["C3", "Db3", "E3", "Gb3", "Ab3"]
            },
            currentScale: ["C3", "F3", "G3", "Bb3", "C4"],
            variationSeed: 0 // New seed to drive visual variety
        };

        const canvas = document.getElementById('art-canvas');
        const ctx = canvas.getContext('2d');
        const startBtn = document.getElementById('start-btn');
        const startScreen = document.getElementById('start-screen');
        const dataHud = document.getElementById('data-hud');
        const newsTicker = document.getElementById('news-ticker');
        const tickerContent = document.getElementById('ticker-content');

        let width, height;
        let particles = [];

        // --- AUDIO ---
        let mainSynth, subDrone, filter, reverb, crush, lfo, analyzer;
        
        async function initAudio() {
            await Tone.start();
            
            analyzer = new Tone.Analyser("waveform", 256);
            const limiter = new Tone.Limiter(-1).toDestination();
            reverb = new Tone.Reverb({ decay: 15, wet: 0.5 }).connect(limiter);
            crush = new Tone.BitCrusher(4).connect(reverb);
            crush.wet.value = 0.05;
            
            filter = new Tone.Filter(1000, "lowpass").connect(crush);
            filter.connect(analyzer);
            
            lfo = new Tone.LFO("0.01Hz", 300, 2000).connect(filter.frequency).start();

            mainSynth = new Tone.PolySynth(Tone.FMSynth, {
                harmonicity: 3,
                modulationIndex: 10,
                envelope: { attack: 0.5, decay: 1, sustain: 0.5, release: 5 }
            }).connect(filter);
            mainSynth.volume.value = -8;

            subDrone = new Tone.FMSynth({
                oscillator: { type: "sine" },
                envelope: { attack: 10, sustain: 1, release: 10 }
            }).connect(reverb);
            subDrone.volume.value = -25;
            subDrone.triggerAttack("C1");

            new Tone.Loop(time => {
                if(!State.isRunning) return;
                const note = State.currentScale[Math.floor(Math.random() * State.currentScale.length)];
                if (Math.random() > 0.6) {
                    mainSynth.triggerAttackRelease(note, "1n", time, 0.3);
                }
            }, "2n").start(0);

            Tone.Transport.start();
        }

        async function gatherWorldData() {
            try {
                const feeds = [
                    'http://feeds.bbci.co.uk/news/world/rss.xml',
                    'https://rss.nytimes.com/services/xml/rss/nyt/World.xml',
                    'https://www.theguardian.com/world/rss',
                    'http://feeds.bbci.co.uk/news/technology/rss.xml'
                ];

                const results = await Promise.all(feeds.map(f => 
                    fetch(`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(f)}`)
                    .then(r => r.json()).catch(() => ({ items: [] }))
                ));

                let headlines = [];
                results.forEach(res => {
                    if (res.items) res.items.forEach(item => headlines.push(item.title.toUpperCase()));
                });

                if (headlines.length > 0) State.news = headlines.sort(() => Math.random() - 0.5);

                const wRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=40.71&longitude=-74.00&current_weather=true`);
                const wData = await wRes.json();
                State.weather = { temp: wData.current_weather.temperature, wind: wData.current_weather.windspeed };
                document.getElementById('weather-text').innerText = `${State.weather.temp}°C / ${State.weather.wind} KMH`;

                processState();
                updateTicker();
            } catch (e) { console.log(e); }
        }

        function processState() {
            const txt = State.news.join(" ").toLowerCase();
            const pos = ['peace', 'success', 'discovery', 'new', 'rise', 'deal', 'green', 'future', 'growth'];
            const neg = ['war', 'death', 'crisis', 'strike', 'conflict', 'threat', 'crash', 'fears', 'tension'];
            
            let score = 0;
            pos.forEach(w => { if(txt.includes(w)) score++; });
            neg.forEach(w => { if(txt.includes(w)) score--; });
            State.sentiment = score / 5;

            const moodEl = document.getElementById('hud-mood');
            const dot = document.getElementById('vis-dot');

            if (State.sentiment > 0.8) {
                State.currentScale = State.scales.calm;
                State.targetHue = 190;
                State.visMode = 'flow';
                dot.style.backgroundColor = '#22d3ee';
                moodEl.innerText = "Coherent harmony detected in global data streams. Fluidity prioritized.";
            } else if (State.sentiment < -0.8) {
                State.currentScale = State.scales.tense;
                State.targetHue = 350;
                State.visMode = 'geometric';
                dot.style.backgroundColor = '#ef4444';
                moodEl.innerText = "Systematic dissonance observed. Structural rigidity and fragmentation active.";
            } else {
                State.currentScale = State.scales.neutral;
                State.targetHue = 240;
                State.visMode = 'neural';
                dot.style.backgroundColor = '#ffffff';
                moodEl.innerText = "Balanced telemetry. Maintaining standard neural connectivity network.";
            }
            State.speedMult = 0.4 + (State.weather.wind * 0.06);
        }

        function updateTicker() {
            const sep = '<span class="mx-24 opacity-20">—</span>';
            tickerContent.innerHTML = State.news.join(sep);
        }

        class Agent {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 3 + 1.0;
                this.ang = Math.random() * Math.PI * 2;
            }
            update() {
                if (State.visMode === 'flow') {
                    const freq = State.currentVariant === 'liquid' ? 0.004 : 0.015;
                    const noise = Math.sin(this.x * freq) * Math.cos(this.y * freq) * Math.PI * 3;
                    this.vx += Math.cos(noise) * 0.15;
                    this.vy += Math.sin(noise) * 0.15;
                    this.vx *= 0.98; this.vy *= 0.98;
                }
                this.x += this.vx * State.speedMult;
                this.y += this.vy * State.speedMult;
                if (this.x < 0 || this.x > width || this.y < 0 || this.y > height) this.reset();
            }
            draw(audioSens) {
                // High variety in drawing logic based on audio and state
                const glow = 5 + (audioSens * 40 * Math.sin(State.variationSeed));
                const dynamicSize = this.size * (1 + audioSens * 2);
                
                ctx.shadowBlur = glow;
                ctx.shadowColor = `hsla(${State.currentHue}, 80%, 60%, 0.6)`;
                
                // Variation shift: cycle between filled circles, strokes, or squares
                const drawStyle = Math.floor(State.variationSeed % 3);
                ctx.fillStyle = ctx.strokeStyle = `hsla(${State.currentHue}, 70%, 70%, ${0.5 + audioSens})`;
                
                if (State.visMode === 'geometric' || drawStyle === 2) {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(Date.now() * 0.0015);
                    ctx.fillRect(-dynamicSize, -dynamicSize, dynamicSize*2, dynamicSize*2);
                    ctx.restore();
                } else if (drawStyle === 1) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, dynamicSize, 0, Math.PI * 2);
                    ctx.lineWidth = 1 + audioSens * 5;
                    ctx.stroke();
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, dynamicSize, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }
        }

        function animate() {
            if (!State.isRunning) return;

            // Shift visual variety every 5 seconds (roughly)
            State.variationSeed += 0.005;
            
            State.evolution = (State.evolution + 0.12) % 100;
            if (State.evolution < 0.15) {
                const variants = State.visVariants[State.visMode];
                State.currentVariant = variants[Math.floor(Math.random() * variants.length)];
                // Occasionally "flicker" the hue significantly for expectation
                if(Math.random() > 0.8) State.currentHue = (State.currentHue + 40) % 360;
            }

            const trail = State.visMode === 'flow' ? 0.03 : 0.1;
            ctx.fillStyle = `rgba(0, 0, 0, ${trail})`;
            ctx.fillRect(0, 0, width, height);

            State.currentHue += (State.targetHue - State.currentHue) * 0.01;

            const audioData = analyzer.getValue();
            const audioSens = audioData.reduce((a, b) => a + Math.abs(b), 0) / 256;

            if (State.visMode !== 'flow') {
                const threshold = State.currentVariant === 'synaptic' ? 180 : 100;
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw(audioSens);
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const d = dx*dx + dy*dy;
                        if (d < threshold * threshold) {
                            const alpha = (1 - Math.sqrt(d)/threshold) * (0.2 + audioSens);
                            ctx.strokeStyle = `hsla(${State.currentHue}, 60%, 60%, ${alpha})`;
                            // Line width pulses with audio variety
                            ctx.lineWidth = (0.5 + audioSens * 3) * (Math.sin(State.variationSeed * 2) + 1.2);
                            ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.stroke();
                        }
                    }
                }
            } else {
                particles.forEach(p => { p.update(); p.draw(audioSens); });
            }

            requestAnimationFrame(animate);
        }

        startBtn.addEventListener('click', async () => {
            startBtn.disabled = true;
            startBtn.innerHTML = "SYNCING...";
            await initAudio();
            await gatherWorldData();
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
                dataHud.classList.add('visible');
                newsTicker.classList.add('visible');
            }, 3000);
            State.isRunning = true;
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
            particles = Array.from({length: 130}, () => new Agent());
            animate();
            setInterval(gatherWorldData, 300000); 
        });

        newsTicker.addEventListener('click', () => {
            State.isFocused = !State.isFocused;
            newsTicker.classList.toggle('focused', State.isFocused);
            dataHud.style.opacity = State.isFocused ? "0" : "1";
        });

        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            canvas.width = width; canvas.height = height;
        });
    </script>
</body>
</html>
